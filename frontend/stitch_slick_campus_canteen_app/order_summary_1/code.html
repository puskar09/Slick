    body {
      min-height: max(884px, 100dvh);

<body class="bg-black text-on-surface font-body-md antialiased min-h-screen selection:bg-primary/30 selection:text-primary">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 border-b border-white/10 bg-black/80 backdrop-blur-md flex justify-between items-center px-gutter py-sm max-w-[1200px] mx-auto flat no shadows left-0 right-0">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-white/5 active:scale-95 duration-200 transition-all text-primary">
<span class="material-symbols-outlined text-[24px]">restaurant_menu</span>
</button>
<h1 class="font-display-lg text-[32px] font-bold text-primary tracking-tighter">Slick</h1>
<div class="w-10 h-10 rounded-full overflow-hidden border border-white/10 hover:opacity-80 transition-opacity cursor-pointer">
<img alt="User Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDB979ZW7Axa0cRDhTIJ8F6PZksffThXdrgIaUKADKbafOIIe_Ps0RSIgoeJnQakd_4R47zAqzdRmD_HWxC-FTR6HNcJHqsimP6zvKqXxb5TFu7ms8YvBNQ3zSe_Fji5YPbRrDwu4UwWTOaIIXJMfDoqEMsrLyOohsAT9SXWacxQ5_JYTuq2uDhXoZQuwo0Tczh2rfFIVQwoTCUa0fyHALlmw6VtdH7c1bBgJqKWMToQYOnvjpdpPAfm2Rzd-kFPiJc6YOKujCRBeDH"/>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-[90px] pb-[120px] px-gutter md:px-container-padding max-w-[1200px] mx-auto flex flex-col items-center justify-center min-h-screen">
<!-- Order Status -->
<div class="flex items-center gap-sm mb-lg">
<div class="w-3 h-3 rounded-full bg-primary shadow-[0_0_12px_rgba(255,191,0,0.8)] relative">
<div class="absolute inset-0 rounded-full bg-primary animate-ping opacity-75"></div>
</div>
<span class="font-body-lg text-body-lg text-primary tracking-wide">In the Kitchen</span>
</div>
<!-- Glassmorphism Bill Card -->
<article class="w-full max-w-md bg-white/[0.08] backdrop-blur-[24px] border border-white/[0.12] border-t-white/[0.18] rounded-2xl p-xl flex flex-col gap-xl relative overflow-hidden">
<!-- Token Section -->
<div class="flex flex-col items-center text-center gap-xs">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Order Token</span>
<span class="font-display-lg text-[72px] leading-none font-bold text-on-surface">#402</span>
</div>
<!-- QR Code -->
<div class="flex flex-col items-center gap-sm">
<div class="bg-white p-3 rounded-xl shadow-lg relative group">
<img alt="QR Code for Order 402" class="w-[160px] h-[160px] object-contain group-hover:opacity-90 transition-opacity rounded-lg" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCaifxPh25cflbP7gvxJOS-wTT4xodxOW_26Hzzx9gT2fT2vNVWf8m2IxOHXWuOaHn7U-VF8soinH-DdEx5W1F0AoSU-IfGsvMRiZSI-tpaNNgR3x_EetSaZ3kCHsKlE65JEr-HAL8d9n0bGlfwUPe95L2ZsLCsplb3nRp5EzLyptw274mAaCkkEl7o0FUJ8DaiQ8t9jGyGlWR7op6qp_1hXjNuObI1BBUgccWPh8ff9c_F2vinBEFp1glj0tGepOEhMUKZbeq6_mZf"/>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant">Scan for pickup</span>
</div>
<!-- Divider -->
<div class="w-full h-[1px] bg-white/[0.08] mx-auto"></div>
<!-- Itemized List -->
<div class="flex flex-col gap-md w-full">
<h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider mb-xs">Order Details</h2>
<div class="flex justify-between items-start border-b border-white/[0.04] pb-sm">
<div class="flex flex-col gap-xs">
<span class="font-body-lg text-body-lg text-on-surface">Umami Truffle Burger</span>
<div class="flex items-center gap-2">
<span class="font-label-sm text-label-sm text-on-surface-variant">No onions, extra sauce</span>
</div>
<span class="bg-primary/10 text-primary px-2 py-0.5 rounded-full font-label-sm text-label-sm w-fit mt-1">Halal</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface">$14.50</span>
</div>
<div class="flex justify-between items-start border-b border-white/[0.04] pb-sm">
<div class="flex flex-col gap-xs">
<span class="font-body-lg text-body-lg text-on-surface">Sweet Potato Fries</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface">$5.00</span>
</div>
<div class="flex justify-between items-start border-b border-white/[0.04] pb-sm">
<div class="flex flex-col gap-xs">
<span class="font-body-lg text-body-lg text-on-surface">Nitro Cold Brew</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface">$4.50</span>
</div>
</div>
<!-- Total -->
<div class="flex justify-between items-center pt-sm mt-sm border-t border-white/[0.12]">
<span class="font-headline-md text-headline-md text-on-surface">Total</span>
<span class="font-headline-lg text-[32px] text-primary font-bold">$24.00</span>
</div>
</article>
</main>
<!-- BottomNavBar (Mobile) -->
<nav class="md:hidden fixed bottom-0 w-full z-50 rounded-t-xl border-t border-white/10 bg-black/80 backdrop-blur-xl flex justify-around items-center h-[80px] px-gutter pb-safe flat no shadows left-0 right-0">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 duration-150 gap-1 w-16" href="#">
<span class="material-symbols-outlined text-[24px]">grid_view</span>
<span class="font-label-sm text-[10px]">Menu</span>
</a>
<!-- Active Tab -->
<a class="flex flex-col items-center justify-center text-primary font-bold bg-primary/10 rounded-xl px-5 py-2 active:scale-90 duration-150 gap-1 min-w-[80px]" href="#">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
<span class="font-label-sm text-[10px]">Orders</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 duration-150 gap-1 w-16" href="#">
<span class="material-symbols-outlined text-[24px]">person</span>
<span class="font-label-sm text-[10px]">Profile</span>
</a>
</nav>
<!-- Desktop Navigation (Hidden on Mobile) -->
<nav class="hidden md:flex fixed top-[80px] left-0 h-[calc(100vh-80px)] w-64 bg-black/50 border-r border-white/10 flex-col p-lg gap-sm backdrop-blur-xl">
<a class="flex items-center gap-sm text-on-surface-variant hover:bg-white/5 p-sm rounded-lg transition-colors" href="#">
<span class="material-symbols-outlined">grid_view</span>
<span class="font-label-md text-label-md">Menu</span>
</a>
<a class="flex items-center gap-sm bg-primary/10 text-primary font-bold p-sm rounded-lg transition-colors" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
<span class="font-label-md text-label-md">Orders</span>
</a>
<a class="flex items-center gap-sm text-on-surface-variant hover:bg-white/5 p-sm rounded-lg transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-label-md text-label-md">Profile</span>
</a>
</nav>
</body></html>
